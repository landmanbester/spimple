spifit:
  flavour: python
  command: spimple.core.spifit.spifit
  outputs:
    output_prefix:
      dtype: File
      implicit: '{current.output_prefix}'
      info: Output filename prefix for the spifit products.
  name: spifit
  info: Fit spectral index map.
  inputs:
    image:
      info: Image to process
      dtype: List[str]
      required: true
      policies:
        positional: true
    residual:
      info: Residual image to process
      dtype: List[str]
    psf_pars:
      info: PSF (beam) parameters matching FWHM of restoring beam specified as emaj
        emin pa. Taken from the fits header by default.
      dtype: Tuple[float, float, float]
    circ_psf:
      info: Flag to use circular restoring PSF (beam)
      dtype: bool
      default: false
    threshold:
      info: Multiple of the rms in the residual to threshold on. Only components above
        threshold*rms will be fit.
      dtype: float
      default: 10
    maxDR:
      info: Maximum dynamic range used to determine the threshold. Only used when
        residual is not available.
      dtype: float
      default: 1000
    nthreads:
      info: Number of threads to use. Defaults to all
      dtype: int
    pfb_min:
      info: Don't fit components where the primary beam is less than this
      dtype: float
      default: 0.15
    products:
      info: "Outputs to write. Letter correspond to: \na - alpha map \ne - alpha error\
        \ map \ni - I0 map \nk - I0 error map \nI - reconstructed cube form alpha\
        \ and I0 \nc - restoring beam used for convolution \nm - convolved model \n\
        r - convolved residual \nb - average power beam \nd - difference between data\
        \ and fitted model \nDefault is to write all of them"
      default: aeikIcmrbd
    padding_frac:
      info: Padding factor for FFT's.
      dtype: float
      default: 0.5
    dont_convolve:
      info: Disable convolution with clean PSF (beam)
      dtype: bool
      default: false
    channel_weights_keyword:
      info: Header for channel weight
      default: WSCIMWG
    channel_freqs:
      info: Optional channel frequencies to overwrite fits coordinates.Has to be passed
        in as a comma separated string.
    ref_freq:
      info: Optional reference frequency to overwrite default taken from fits
      dtype: float
    out_dtype:
      info: dtype of output images
      default: f4
    add_convolved_residuals:
      info: Flag to add the convolved residuals to the convolved model
      dtype: bool
      default: false
    ms:
      info: Optional path to MS used to get the paralactic angle rotation
      dtype: MS
    beam_model:
      info: Beam model to use. This can be provided as fits files in which caseit
        assumes the path/to/beam_folder/name_corr_re/im.fits pattern. Also accepts
        JimBeam in which case it will get the beam from katbeam.
      dtype: Path
    sparsify_time:
      info: Subsample PA by this many integrations when computing PA during beam interpolation.
      dtype: int
      default: 10
    corr_type:
      info: Correlation type
      choices:
      - linear
      - circular
      default: linear
    band:
      info: Band to use with JimBeam. L, UHF or S
      default: L
    deselect_bands:
      info: Optional bands to select. Has to be passed in as a comma separated string
